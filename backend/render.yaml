# Render Blueprint — automatically deploy this service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chibuike-dedication-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://masterchibuike.vercel.app
      - key: PORT
        value: 3000
      - key: ADMIN_SECRET
        sync: false
